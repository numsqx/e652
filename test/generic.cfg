MEMORY {
  RAM:  start = $0000, size = $8000, fill = yes;
  ROM:  start = $8000, size = $8000, fill = yes;
}

SEGMENTS {
  ZEROPAGE:   load = RAM, type = zp, start = $0000;
  DATA:       load = RAM, type = rw, start = $0200;
  CODE:       load = ROM, type = ro, start = $8000;
  VEC:        load = ROM, type = ro, start = $FFFA;
}
