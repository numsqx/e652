MEMORY {
    ZP:         start = $0000, size = $0100, type = rw;
    RAM:        start = $0000, size = $8000, fill = yes, type = rw;
    ROM:        start = $8000, size = $7F00, fill = yes, file = %O;
    VEC:        start = $FF00, size = $0100, fill = yes, type = ro;
}

SEGMENTS {
    ZEROPAGE:   load = ZP, type = zp;
    CODE:       load = ROM, type = ro;
    VEC:        load = VEC, type = ro;
}
